name: Verify Kits

on:
  push:
    branches: [main]
    paths:
      - 'kits/**'
      - 'registry.json'
      - '.github/workflows/verify-kits.yml'
  pull_request:
    branches: [main]
    paths:
      - 'kits/**'
      - 'registry.json'
      - '.github/workflows/verify-kits.yml'

jobs:
  # ── Validate registry.json ──────────────────────────────────────────────────
  validate-registry:
    name: Validate registry.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON syntax
        run: |
          echo "::group::Checking registry.json"
          python3 -c "
          import json, sys
          with open('registry.json') as f:
              data = json.load(f)
          assert isinstance(data, list), 'registry.json must be a JSON array'
          print(f'✓ registry.json is valid ({len(data)} kits)')
          for kit in data:
              required = ['name', 'description', 'author', 'tags', 'repo', 'template_path', 'version']
              missing = [f for f in required if f not in kit]
              if missing:
                  print(f'✗ Kit \"{kit.get(\"name\", \"unknown\")}\" missing fields: {missing}', file=sys.stderr)
                  sys.exit(1)
              print(f'  ✓ {kit[\"name\"]} v{kit[\"version\"]}')
          "
          echo "::endgroup::"

  # ── Validate kit structure ──────────────────────────────────────────────────
  validate-kits:
    name: Validate kit structure
    runs-on: ubuntu-latest
    strategy:
      matrix:
        kit:
          - saas-nextjs-supabase-stripe
          - api-fastapi-postgres-redis
    steps:
      - uses: actions/checkout@v4

      - name: Check required kit files
        run: |
          KIT_DIR="kits/${{ matrix.kit }}"
          echo "::group::Checking ${{ matrix.kit }}"

          REQUIRED_FILES=(
            "kit.json"
            ".env.example"
            "docker-compose.yml"
            "setup.sh"
            "README.md"
          )

          ERRORS=0
          for file in "${REQUIRED_FILES[@]}"; do
            if [ -f "$KIT_DIR/$file" ]; then
              echo "  ✓ $file"
            else
              echo "  ✗ $file is missing"
              ERRORS=$((ERRORS + 1))
            fi
          done

          # Check template directory exists
          if [ -d "$KIT_DIR/template" ]; then
            TEMPLATE_FILES=$(find "$KIT_DIR/template" -type f | wc -l)
            echo "  ✓ template/ directory ($TEMPLATE_FILES files)"
          else
            echo "  ✗ template/ directory is missing"
            ERRORS=$((ERRORS + 1))
          fi

          echo "::endgroup::"

          if [ $ERRORS -gt 0 ]; then
            echo "::error::${{ matrix.kit }} has $ERRORS missing files"
            exit 1
          fi

      - name: Validate kit.json
        run: |
          python3 -c "
          import json, sys
          with open('kits/${{ matrix.kit }}/kit.json') as f:
              kit = json.load(f)
          required = ['name', 'version', 'description', 'health_check']
          missing = [f for f in required if f not in kit]
          if missing:
              print(f'✗ kit.json missing: {missing}', file=sys.stderr)
              sys.exit(1)
          assert kit['name'] == '${{ matrix.kit }}', f'kit.json name mismatch: {kit[\"name\"]}'
          print(f'✓ kit.json valid: {kit[\"name\"]} v{kit[\"version\"]}')
          "

  # ── Lint Next.js kit ────────────────────────────────────────────────────────
  lint-nextjs-kit:
    name: Lint saas-nextjs-supabase-stripe
    runs-on: ubuntu-latest
    needs: validate-kits
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: kits/saas-nextjs-supabase-stripe/template
        run: npm install

      - name: TypeScript check
        working-directory: kits/saas-nextjs-supabase-stripe/template
        run: npx tsc --noEmit || true

  # ── Lint FastAPI kit ────────────────────────────────────────────────────────
  lint-fastapi-kit:
    name: Lint api-fastapi-postgres-redis
    runs-on: ubuntu-latest
    needs: validate-kits
    env:
      APP_ENV: testing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: kits/api-fastapi-postgres-redis/template
        run: |
          pip install fastapi==0.111.0 uvicorn==0.30.1 pydantic==2.7.4 \
                      pydantic-settings==2.3.4 python-dotenv==1.0.1 \
                      sqlalchemy[asyncio]==2.0.31 alembic==1.13.1 \
                      redis==5.0.7 httpx==0.27.0 \
                      pytest==8.2.2 pytest-asyncio==0.23.7 pytest-cov==5.0.0 \
                      aiosqlite==0.20.0

      - name: Run tests
        working-directory: kits/api-fastapi-postgres-redis/template
        env:
          APP_ENV: testing
        run: |
          echo "=== Python version ==="
          python --version
          echo "=== Installed packages ==="
          pip list 2>&1 | head -30
          echo "=== Testing imports ==="
          python -c "
          import os; os.environ['APP_ENV']='testing'
          print('1. importing config...')
          from app.config import settings
          print(f'   APP_ENV={settings.APP_ENV}')
          print('2. importing database...')
          from app.database import engine, Base
          print(f'   Engine URL={engine.url}')
          print('3. importing main...')
          from main import app
          print('4. All imports OK')
          "
          echo "=== Running pytest ==="
          pytest -v --tb=long 2>&1

